<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZephyrMart Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232d5a4f'/%3E%3Cpath d='M16 18h32v8H16zm0 14h32v8H16zm0 14h22v8H16z' fill='%23fffaf5'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="demo-body">
    <div class="stepper-shell">

      <header class="stepper-topbar">
        <nav class="phase-nav" id="phase-nav" aria-label="phases"></nav>
        <div class="step-meta">
          <span class="step-counter" id="step-counter">1 / 10</span>
          <span class="step-title-tag" id="step-title-tag">无工程介入</span>
        </div>
        <div class="topbar-actions">
          <button id="prev-btn" class="ghost-button" disabled aria-label="上一步">◀ 上一步</button>
          <button id="next-btn" class="ghost-button" aria-label="下一步">下一步 ▶</button>
          <a class="demo-link" href="index.html">← 返回课件</a>
        </div>
      </header>

      <main class="stepper-main" id="step-content" aria-live="polite">
        <!-- rendered by demo.js -->
      </main>

      <footer class="stepper-footer">
        <p class="eyebrow">讲师注</p>
        <p class="teacher-note-text" id="teacher-note"></p>
      </footer>

    </div>
    <script src="demo.js"></script>
  </body>
</html>
